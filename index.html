<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Proyecto de Muestra</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    :root{
      --bg:#f3f5f7;
      --panel:#ffffff;
      --panel-soft:#f8fafc;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#d9dee5;
      --shadow:0 10px 28px rgba(0,0,0,.12);

      /* Colores sobrios y convincentes */
      --mun-fill: rgba(25, 85, 166, 0.22);
      --mun-stroke: #184f96;

      --loc-fill: rgba(46, 125, 50, 0.22);
      --loc-stroke: #2e7d32;

      --eji-fill: rgba(191, 87, 0, 0.20);
      --eji-stroke: #a85600;

      --accent:#0f3d62;
      --accent-2:#16324f;
      --gold:#b6923e;
    }

    html, body{
      margin:0;
      padding:0;
      height:100%;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .topbar{
      height:68px;
      background:linear-gradient(90deg, #12263a 0%, #17324d 55%, #204466 100%);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      box-shadow:0 2px 12px rgba(0,0,0,.15);
      z-index:1001;
    }

    .title-wrap{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .title{
      font-size:22px;
      font-weight:700;
      letter-spacing:.2px;
      margin:0;
    }

    .subtitle{
      font-size:12px;
      color:rgba(255,255,255,.82);
      margin:0;
    }

    .topbar-badge{
      font-size:12px;
      padding:8px 12px;
      border:1px solid rgba(255,255,255,.20);
      border-radius:999px;
      background:rgba(255,255,255,.06);
      backdrop-filter: blur(4px);
    }

    .app{
      flex:1;
      display:flex;
      min-height:0;
      position:relative;
    }

    #map{
      flex:1;
      height:100%;
      width:100%;
    }

    .sidepanel{
      width:370px;
      max-width:42vw;
      background:var(--panel);
      border-left:1px solid var(--line);
      box-shadow:-8px 0 24px rgba(0,0,0,.08);
      position:absolute;
      top:18px;
      right:18px;
      bottom:18px;
      z-index:950;
      border-radius:18px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      transform:translateX(0);
      transition:all .25s ease;
    }

    .sidepanel.hidden{
      transform:translateX(115%);
      opacity:0;
      pointer-events:none;
    }

    .panel-header{
      background:linear-gradient(180deg, #f9fbfd 0%, #eef3f8 100%);
      border-bottom:1px solid var(--line);
      padding:14px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .panel-header h2{
      margin:0;
      font-size:16px;
      color:var(--accent-2);
    }

    .close-btn{
      border:none;
      background:#e7edf4;
      color:#28435d;
      width:34px;
      height:34px;
      border-radius:10px;
      cursor:pointer;
      font-size:18px;
      font-weight:700;
    }

    .close-btn:hover{
      background:#dbe5ef;
    }

    .panel-body{
      padding:14px 16px 18px 16px;
      overflow:auto;
      flex:1;
      background:#fff;
    }

    .feature-type{
      display:inline-block;
      margin-bottom:12px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.4px;
      text-transform:uppercase;
      border-radius:999px;
      padding:7px 11px;
      background:#eef4fa;
      color:var(--accent);
      border:1px solid #d5e2ef;
    }

    .info-grid{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .info-item{
      border:1px solid #e6ebf0;
      border-radius:12px;
      padding:10px 12px;
      background:var(--panel-soft);
    }

    .info-key{
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.45px;
      color:var(--muted);
      margin-bottom:4px;
      font-weight:700;
    }

    .info-value{
      font-size:14px;
      color:var(--text);
      line-height:1.4;
      word-break:break-word;
    }

    .panel-empty{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      padding:10px 2px;
    }

    .footer-bar{
      height:38px;
      background:#0f1f2f;
      color:rgba(255,255,255,.88);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      letter-spacing:.2px;
    }

    /* Tarjetas flotantes Leaflet */
    .leaflet-control-layers{
      border:none !important;
      border-radius:14px !important;
      box-shadow:var(--shadow) !important;
      overflow:hidden;
    }

    .leaflet-control-layers-expanded{
      background:#ffffff !important;
      color:var(--text) !important;
      padding:12px 12px 8px 12px !important;
      min-width:210px;
    }

    .leaflet-control-layers-separator{
      border-top:1px solid #e5e7eb !important;
    }

    .custom-legend{
      background:#fff;
      padding:12px 14px;
      border-radius:14px;
      box-shadow:var(--shadow);
      border:1px solid #e5e7eb;
      line-height:1.35;
      min-width:180px;
    }

    .custom-legend h4{
      margin:0 0 10px 0;
      font-size:13px;
      color:#24384d;
    }

    .legend-row{
      display:flex;
      align-items:center;
      gap:9px;
      margin-bottom:8px;
      font-size:12px;
      color:#374151;
    }

    .legend-swatch{
      width:18px;
      height:18px;
      border-radius:4px;
      border:2px solid transparent;
      box-sizing:border-box;
      flex:0 0 18px;
    }

    .map-watermark{
      background:rgba(255,255,255,.92);
      padding:8px 12px;
      border-radius:12px;
      box-shadow:var(--shadow);
      border:1px solid #e5e7eb;
      font-size:12px;
      color:#31475d;
      font-weight:600;
    }

    .leaflet-popup-content-wrapper{
      border-radius:14px !important;
    }

    .leaflet-popup-content{
      font-size:13px;
      line-height:1.45;
      margin:12px 14px !important;
    }

    @media (max-width: 900px){
      .sidepanel{
        width:calc(100% - 20px);
        max-width:none;
        left:10px;
        right:10px;
        top:auto;
        bottom:10px;
        height:46%;
      }

      .title{
        font-size:18px;
      }

      .subtitle{
        display:none;
      }

      .topbar-badge{
        display:none;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="title-wrap">
      <h1 class="title">Proyecto de Muestra</h1>
      <p class="subtitle">Geoportal de consulta territorial · Nayarit</p>
    </div>
    <div class="topbar-badge">Visor estratégico para análisis territorial</div>
  </header>

  <div class="app">
    <div id="map"></div>

    <aside id="sidepanel" class="sidepanel hidden">
      <div class="panel-header">
        <h2>Ficha del elemento</h2>
        <button id="closePanelBtn" class="close-btn" title="Cerrar">×</button>
      </div>
      <div id="panelBody" class="panel-body">
        <div class="panel-empty">
          Haz clic sobre un polígono para consultar su información.
        </div>
      </div>
    </aside>
  </div>

  <footer class="footer-bar">
    Desarrollado por AgrumSIG
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /******************************************************************
     * CONFIGURACIÓN GENERAL
     ******************************************************************/
    const map = L.map('map', {
      center: [21.7514, -104.8455], // Nayarit aproximado
      zoom: 8,
      zoomControl: true
    });

    /******************************************************************
     * MAPAS BASE
     ******************************************************************/
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap'
    });

    const satellite = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        maxZoom: 20,
        attribution: '&copy; Esri, Maxar, Earthstar Geographics'
      }
    );

    osm.addTo(map);

    /******************************************************************
     * VARIABLES DE CAPAS
     ******************************************************************/
    let munLayer = null;
    let locLayer = null;
    let ejiLayer = null;

    let currentHighlightedLayer = null;

    /******************************************************************
     * ESTILOS CARTOGRÁFICOS
     ******************************************************************/
    function styleMunicipal() {
      return {
        color: '#A40130',
        weight: 1.5,
        opacity: 0.95,
        fillColor: '##A40130',
        fillOpacity: 0.32
      };
    }

    function styleLocalidad() {
      return {
        color: '#f7de23',
        weight: 1.6,
        opacity: 0.95,
        fillColor: '#14130c',
        fillOpacity: 0.22
      };
    }

    function styleEjidal() {
      return {
        color: '#a85600',
        weight: 1.3,
        opacity: 0.95,
        fillColor: '#bf5700',
        fillOpacity: 0.20
      };
    }

    function highlightStyle() {
      return {
        weight: 4,
        color: '#f4c542',
        fillOpacity: 0.35
      };
    }

    /******************************************************************
     * PANEL LATERAL
     ******************************************************************/
    const sidepanel = document.getElementById('sidepanel');
    const panelBody = document.getElementById('panelBody');
    const closePanelBtn = document.getElementById('closePanelBtn');

    closePanelBtn.addEventListener('click', () => {
      sidepanel.classList.add('hidden');
      clearHighlight();
    });

    function clearHighlight() {
      if (currentHighlightedLayer) {
        if (currentHighlightedLayer.defaultStyle) {
          currentHighlightedLayer.setStyle(currentHighlightedLayer.defaultStyle);
        }
        currentHighlightedLayer = null;
      }
    }

    function prettifyKey(key) {
      return key
        .replace(/_/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatValue(value) {
      if (value === null || value === undefined || value === '') return 'Sin dato';

      if (typeof value === 'number') {
        return new Intl.NumberFormat('es-MX').format(value);
      }

      const str = String(value).trim();

      if (str === '' || str.toLowerCase() === 'null') return 'Sin dato';

      // Si es número en texto, intentar formatear
      const numeric = Number(str.replace(/,/g, ''));
      if (!isNaN(numeric) && str !== '') {
        return new Intl.NumberFormat('es-MX').format(numeric);
      }

      return str;
    }

    function openInfoPanel(properties, layerType) {
      let badgeLabel = 'Elemento';
      if (layerType === 'municipal') badgeLabel = 'Escala municipal';
      if (layerType === 'localidad') badgeLabel = 'Escala localidad';
      if (layerType === 'ejidal') badgeLabel = 'Escala ejidal';

      const keys = Object.keys(properties || {});
      let html = `<div class="feature-type">${badgeLabel}</div>`;

      if (!keys.length) {
        html += `<div class="panel-empty">Este elemento no contiene atributos visibles.</div>`;
      } else {
        html += `<div class="info-grid">`;
        keys.forEach(key => {
          html += `
            <div class="info-item">
              <div class="info-key">${prettifyKey(key)}</div>
              <div class="info-value">${formatValue(properties[key])}</div>
            </div>
          `;
        });
        html += `</div>`;
      }

      panelBody.innerHTML = html;
      sidepanel.classList.remove('hidden');
    }

    /******************************************************************
     * INTERACCIÓN COMÚN DE CAPAS
     ******************************************************************/
    function bindFeatureEvents(feature, layer, layerType, defaultStyleObj) {
      layer.defaultStyle = defaultStyleObj;

      layer.on({
        mouseover: function(e) {
          const lyr = e.target;
          lyr.setStyle({
            weight: defaultStyleObj.weight + 1.2,
            fillOpacity: Math.min((defaultStyleObj.fillOpacity || 0.2) + 0.08, 0.45)
          });
          lyr.bringToFront();
        },
        mouseout: function(e) {
          const lyr = e.target;

          if (currentHighlightedLayer && currentHighlightedLayer === lyr) return;

          lyr.setStyle(defaultStyleObj);
        },
        click: function(e) {

  clearHighlight();

  currentHighlightedLayer = e.target;
  currentHighlightedLayer.setStyle(highlightStyle());
  currentHighlightedLayer.bringToFront();

  openInfoPanel(feature.properties, layerType);

  let nombre = "Sin dato";
  let titulo = "";

  if(layerType === "municipal"){
      nombre = feature.properties["Municipio"];
      titulo = "Municipio";
  }

  if(layerType === "localidad"){
      nombre = feature.properties["nombre de la localidad"];
      titulo = "Localidad";
  }

  if(layerType === "ejidal"){
      nombre = feature.properties["Nombre del núcleo"];
      titulo = "Ejido";
  }

  const popupHtml = `
  <div style="font-size:14px">
    <strong style="color:#1f3a5f">${titulo}</strong><br>
    <span style="font-size:16px">${nombre}</span>
  </div>
  `;

layer.bindPopup(popupHtml).openPopup();
    }
  });
}

    /******************************************************************
     * CARGA DE GEOJSON
     ******************************************************************/
    async function loadGeoJSON(url) {
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`No se pudo cargar: ${url}`);
      }
      return await res.json();
    }

    async function initLayers() {
      try {
        const [munData, locData, ejiData] = await Promise.all([
          loadGeoJSON('data/mun_ejidos_data.geojson'),
          loadGeoJSON('data/loc_ejidos_data.geojson'),
          loadGeoJSON('data/ejidos_ejid_data.geojson')
        ]);

        munLayer = L.geoJSON(munData, {
          style: styleMunicipal,
          onEachFeature: (feature, layer) => bindFeatureEvents(feature, layer, 'municipal', styleMunicipal())
        });

        locLayer = L.geoJSON(locData, {
          style: styleLocalidad,
          onEachFeature: (feature, layer) => bindFeatureEvents(feature, layer, 'localidad', styleLocalidad())
        });

        ejiLayer = L.geoJSON(ejiData, {
          style: styleEjidal,
          onEachFeature: (feature, layer) => bindFeatureEvents(feature, layer, 'ejidal', styleEjidal())
        });

        // Orden visual inteligente:
        // municipal abajo, localidad en medio, ejidal arriba
        munLayer.addTo(map);
        locLayer.addTo(map);
        ejiLayer.addTo(map);

        // Ajuste al total de capas
        const group = L.featureGroup([munLayer, locLayer, ejiLayer]);
        map.fitBounds(group.getBounds(), { padding: [20, 20] });

        addLayerControl();
      } catch (error) {
        console.error(error);
        alert('Hubo un problema al cargar las capas GeoJSON. Revisa nombres de archivos, rutas y formato.');
      }
    }

    /******************************************************************
     * CONTROL DE CAPAS
     ******************************************************************/
    function addLayerControl() {
      const baseMaps = {
        "OpenStreetMap": osm,
        "Satélite": satellite
      };

      const overlayMaps = {
        "Municipal": munLayer,
        "Localidad": locLayer,
        "Ejidal": ejiLayer
      };

      L.control.layers(baseMaps, overlayMaps, {
        collapsed: false,
        position: 'topleft'
      }).addTo(map);
    }

    /******************************************************************
     * LEYENDA
     ******************************************************************/
    const legend = L.control({ position: 'bottomleft' });

    legend.onAdd = function() {
      const div = L.DomUtil.create('div', 'custom-legend');
      div.innerHTML = `
        <h4>Simbología</h4>
        <div class="legend-row">
          <span class="legend-swatch" style="background: rgba(25,85,166,.22); border-color:#184f96;"></span>
          <span>Municipal</span>
        </div>
        <div class="legend-row">
          <span class="legend-swatch" style="background: rgba(46,125,50,.22); border-color:#2e7d32;"></span>
          <span>Localidad</span>
        </div>
        <div class="legend-row">
          <span class="legend-swatch" style="background: rgba(191,87,0,.20); border-color:#a85600;"></span>
          <span>Ejidal</span>
        </div>
      `;
      return div;
    };
    legend.addTo(map);

    /******************************************************************
     * MARCA / WATERMARK EN MAPA
     ******************************************************************/
    const watermark = L.control({ position: 'bottomright' });

    watermark.onAdd = function() {
      const div = L.DomUtil.create('div', 'map-watermark');
      div.innerHTML = 'AgrumSIG · Inteligencia territorial';
      return div;
    };
    watermark.addTo(map);

    /******************************************************************
     * INICIALIZAR
     ******************************************************************/
    initLayers();
  </script>
</body>

</html>
